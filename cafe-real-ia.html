  async function analyzeSoil() {
    if (!soilFile) return;
    setSoilLoading(true);
    setSoilError(null);
    setSoilDraft(null);
    const log = [];
    const pushLog = (evento, detalhe) => log.push({ ts: new Date().toLocaleTimeString("pt-BR"), evento, detalhe });
    const t0 = performance.now();
    pushLog("upload", { nome: soilFile.name, tipo: soilFile.type, tamanhoKB: Math.round(soilFile.size / 1024) });
    const keys = { apiKey, googleVisionKey, azureOcrKey, azureOcrEndpoint };
    try {
      let rawText = "";
      let fonte = "";

      if (soilFile.type === "application/pdf") {
        setSoilStatus("Lendo texto do PDF...");
        const { text, pageCount, doc } = await extractPdfText(soilFile);
        pushLog("pdf_texto", { paginas: pageCount, caracteres: text.replace(/\s/g, "").length });
        if (text.replace(/\s/g, "").length > 60) {
          rawText = text;
          fonte = "PDF digital (texto extraído diretamente, sem OCR)";
        } else {
          setSoilStatus("PDF parece escaneado — convertendo páginas em imagem...");
          const images = await renderPdfPagesToImages(doc);
          pushLog("pdf_paginas_renderizadas", { paginas: images.length });
          let combined = "";
          for (let i = 0; i < images.length; i++) {
            setSoilStatus(`Executando OCR na página ${i + 1}/${images.length}...`);
            const { text: pageText, engine } = await runOcrChain(images[i], keys, pushLog);
            combined += `\n----- Página ${i + 1} (OCR: ${engine || "falhou"}) -----\n${pageText}`;
          }
          rawText = combined;
          fonte = "PDF escaneado (OCR por página)";
        }
      } else {
        setSoilStatus("Executando OCR na imagem...");
        const dataUrl = await fileToDataUrl(soilFile);
        const { text, engine } = await runOcrChain(dataUrl, keys, pushLog);
        rawText = text;
        fonte = `Imagem (OCR: ${engine || "falhou em todos os mecanismos"})`;
      }

      setSoilRawText(rawText);
      pushLog("texto_final", { fonte, caracteres: rawText.length });

      if (!rawText || rawText.replace(/\s/g, "").length < 15) {
        setSoilError("Não foi possível localizar uma análise de solo válida. Verifique se o arquivo está legível.");
        setSoilDebugLog(log);
        setSoilLoading(false);
        setSoilStatus("");
        return;
      }

      // 1ª tentativa: laudo BASLAB / Sistema PROFERT (Adubos Real) — formato tabular com várias amostras
      const profert = parseProfertLaudo(rawText);
      if (profert && profert.samples.length > 0) {
        pushLog("parser_profert", { amostras: profert.samples.map((s) => `${s.codigo} ${s.nome}`) });
        setSoilSamples(profert.samples);
        if (profert.samples.length === 1) setSoilDraft(profert.samples[0].fields);
        pushLog("resultado_final", { tempoTotalMs: Math.round(performance.now() - t0), formato: "PROFERT", amostras: profert.samples.length });
        setSoilDebugLog(log);
        setSoilStatus("");
        setSoilLoading(false);
        return;
      }

      let fields = parseSoilText(rawText);
      pushLog("parser_texto_bruto", { encontrados: Object.keys(fields).filter((k) => fields[k] != null) });

      let structuredText = "";
      if (!requiredFieldsOk(fields)) {
        if (apiKey) {
          setSoilStatus("Organizando texto extraído com IA (sem pedir JSON)...");
          try {
            structuredText = await structureWithClaude(rawText, apiKey);
            const fields2 = parseSoilText(structuredText);
            pushLog("ia_estruturacao", { encontrados: Object.keys(fields2).filter((k) => fields2[k] != null) });
            fields = { ...fields, ...Object.fromEntries(Object.entries(fields2).filter(([, v]) => v != null)) };
          } catch (err) {
            pushLog("ia_estruturacao_erro", { erro: err.message });
          }
        } else {
          pushLog("ia_estruturacao_pulada", { motivo: "sem chave da Anthropic configurada" });
        }
      }
      setSoilStructuredText(structuredText);
      pushLog("resultado_final", { tempoTotalMs: Math.round(performance.now() - t0), campos: fields });
      setSoilDebugLog(log);
      setSoilDraft(fields);
    } catch (err) {
      pushLog("erro_fatal", { erro: err.message });
      setSoilDebugLog(log);
      setSoilError("Não foi possível processar o arquivo automaticamente. Revise/preencha os valores manualmente abaixo.");
      setSoilDraft({});
    }
    setSoilStatus("");
    setSoilLoading(false);
  }

    const finalData = { ...finalFields, ratios };
    setSoilData(finalData);

  async function diagnosePhoto() {
    if (!photoFile) return;
    if (!apiKey) { setShowConfig(true); return; }
    setPhotoLoading(true);
    try {
      const base64 = await fileToBase64(photoFile);
      const mediaType = photoFile.type && photoFile.type.startsWith("image/") ? photoFile.type : "image/jpeg";
      const cultura = "Café";
      // Passo 1 (Opção A do prompt): classificação RESTRITA à lista de alvos da base para a cultura.
      const alvos = alvosDaCultura(cultura);
      const lista = alvos.map((a) => `${a.id} | ${a.tipo} | ${a.nome} (${a.cientifico}) — sintomas: ${a.sintomas}`).join("\n");
      const prompt = `Você é um engenheiro agrônomo fitossanitarista analisando uma foto de ${cultura}. Identifique o problema visível e escolha, na LISTA abaixo, o item que melhor corresponde. Responda APENAS um JSON válido, sem texto fora do JSON:
{"id":"","tipo":"praga|doenca|indeterminado","nome":"","confianca":"alta|media|baixa","sinais_observados":["",""],"justificativa":"","precisa_mais_info":false,"pedido":""}
Regras:
- Escolha "id" e "nome" SOMENTE da lista abaixo (copie exatamente o id e o nome).
- Se nada corresponder ou a foto for inconclusiva (foco ruim, sem contexto, sintoma ambíguo), use id:"", tipo:"indeterminado", confianca:"baixa", precisa_mais_info:true e preencha "pedido" com o que fotografar (parte da planta e ângulo).
- Considere confusões comuns (ex.: deficiência de Mg vs. início de ferrugem; cercosporiose vs. deficiência de N).
- NÃO invente pragas/doenças fora da lista.
LISTA (base oficial do app, cultura ${cultura}):
${lista}`;
      const text = await callClaude(apiKey, [
        { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
        { type: "text", text: prompt },
      ], 700);
      const json = extractJson(text) || {};
      const alvo = alvos.find((a) => a.id && json.id && normTxt(a.id) === normTxt(json.id))
        || alvos.find((a) => json.nome && normTxt(a.nome) === normTxt(json.nome))
        || null;
      // Passo 2: recomendação montada LOCALMENTE a partir da base (sem alucinação).
      const rec = alvo ? recomendarParaAlvo(alvo, cultura) : { quimicos: [], biologicos: [], grupos: [] };
      const result = {
        cultura,
        tipo: alvo ? alvo.tipo : (json.tipo || "indeterminado"),
        alvoId: alvo ? alvo.id : "",
        nome: alvo ? alvo.nome : (json.nome || ""),
        cientifico: alvo ? alvo.cientifico : "",
        confianca: json.confianca || "baixa",
        sinais: json.sinais_observados || [],
        justificativa: json.justificativa || "",
        precisaMais: !alvo || json.precisa_mais_info === true || (json.confianca === "baixa" && !alvo),
        pedido: json.pedido || "",
        quimicos: rec.quimicos,
        biologicos: rec.biologicos,
        grupos: rec.grupos,
        semBase: !!alvo && rec.quimicos.length === 0 && rec.biologicos.length === 0,
      };
      setPhotoResult(result);
      addToHistory("Diagnóstico por foto", result.nome ? `${FOTO_CATEGORIAS[result.tipo] || result.tipo}: ${result.nome}` : "análise inconclusiva");
    } catch (err) {
      setPhotoResult({ tipo: "indeterminado", nome: "", confianca: "baixa", justificativa: "Erro ao consultar a IA: " + err.message, quimicos: [], biologicos: [], grupos: [], precisaMais: true });
    }
    setPhotoLoading(false);
  }

  // Diagnóstico por foto DENTRO do chat: classificação restrita à base + recomendação
  // local (mesma regra de ouro da aba antiga), devolvida como texto para o balão.
  async function diagnoseFotoChat(file, perguntaExtra) {
    const base64 = await fileToBase64(file);
    const mediaType = file.type && file.type.startsWith("image/") ? file.type : "image/jpeg";
    const cultura = "Café";
    const alvos = alvosDaCultura(cultura);
    const lista = alvos.map((a) => `${a.id} | ${a.tipo} | ${a.nome} (${a.cientifico}) — sintomas: ${a.sintomas}`).join("\n");
    const prompt = `Você é o Café IA, fitossanitarista analisando uma foto de ${cultura}. Identifique o problema e escolha da LISTA o item que melhor corresponde. Responda APENAS JSON válido:
{"id":"","tipo":"praga|doenca|indeterminado","nome":"","confianca":"alta|media|baixa","sinais_observados":["",""],"justificativa":"","precisa_mais_info":false,"pedido":""}
Regras: escolha "id" e "nome" SOMENTE da lista; se inconclusivo use id:"", tipo:"indeterminado", confianca:"baixa", precisa_mais_info:true e "pedido" (o que fotografar). Não invente alvos fora da lista.${perguntaExtra ? " Considere também a pergunta do produtor: " + perguntaExtra : ""}
LISTA (cultura ${cultura}):
${lista}`;
    const text = await callClaude(apiKey, [
      { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
      { type: "text", text: prompt },
    ], 700);
    const json = extractJson(text) || {};
    const alvo = alvos.find((a) => a.id && json.id && normTxt(a.id) === normTxt(json.id))
      || alvos.find((a) => json.nome && normTxt(a.nome) === normTxt(json.nome)) || null;
    const rec = alvo ? recomendarParaAlvo(alvo, cultura) : { quimicos: [], biologicos: [], grupos: [] };
    const conf = { alta: "confiança alta", media: "confiança média", baixa: "confiança baixa" }[json.confianca] || "confiança —";
    const L = [];
    if (!alvo || json.precisa_mais_info === true) {
      L.push("🔍 Não consegui identificar com segurança pela foto.");
      L.push(json.pedido || "Envie uma nova foto aproximada do sintoma, com boa luz, mostrando a folha (face superior e inferior), o fruto ou o ramo afetado.");
      return L.join("\n");
    }
    L.push(`🔬 ${FOTO_CATEGORIAS[alvo.tipo] || alvo.tipo}: ${alvo.nome} (${alvo.cientifico}) — ${conf}.`);
    if (json.sinais_observados && json.sinais_observados.length) L.push(`Sinais: ${json.sinais_observados.join("; ")}.`);
    if (json.justificativa) L.push(json.justificativa);
    if (rec.quimicos.length) {
      L.push("\nControle registrado para café (confirme dose e registro no AGROFIT):");
      rec.quimicos.forEach((qm) => L.push(`• ${qm.produto}${qm.grupo ? " (" + qm.grupoTipo + " " + qm.grupo + ")" : ""} — ${qm.ingrediente} · dose ${qm.doseMin}${qm.doseMax && qm.doseMax !== qm.doseMin ? "–" + qm.doseMax : ""} ${qm.unidade}`));
      if (rec.grupos.length > 1) L.push(`Manejo de resistência: alterne os grupos (${rec.grupos.join(", ")}) entre aplicações.`);
    }
    if (rec.biologicos.length) {
      L.push("\nAlternativas biológicas:");
      rec.biologicos.forEach((b) => L.push(`• ${b.nome_comercial} (${b.especie || b.organismo})`));
    }
    if (!rec.quimicos.length && !rec.biologicos.length) L.push("\nNão há produto correspondente na base do app para este alvo em café — consulte o AGROFIT e o agrônomo responsável.");
    L.push("\n⚠️ Recomendação de apoio — não substitui o receituário agronômico (CREA/CFTA).");
    return L.join("\n");
  }

  async function askAssistant(pergunta) {
    const q = (pergunta || chatInput).trim();
    const img = chatImage;
    if ((!q && !img) || chatLoading) return;
    if (!apiKey) { setShowConfig(true); return; }
    setChatInput("");
    setChatImage(null);
    const userMsg = { role: "user", text: q || "Analise esta foto da minha lavoura.", img: img ? img.preview : null };
    const historico = chat.concat(userMsg);
    setChat(historico);
    setChatLoading(true);
    if (img) {
      try {
        const resposta = await diagnoseFotoChat(img.file, q);
        setChat((c) => [...c, { role: "assistant", text: resposta }]);
        addToHistory("Diagnóstico por foto (Café IA)", resposta.split("\n")[0].slice(0, 60));
      } catch (err) {
        setChat((c) => [...c, { role: "assistant", text: "Não consegui analisar a foto agora: " + err.message }]);
      }
      setChatLoading(false);
      return;
    }
    const sistema = `Você é o "Café IA", assistente agronômico especialista em cafeicultura de montanha do Sul de Minas, dentro do app Café Real IA. Fale português técnico e direto, como consultor de campo experiente.
Regras invioláveis:
- Baseie-se no CONTEXTO DA PROPRIEDADE abaixo (dados reais do produtor). Se um dado necessário não existir (ex.: sem análise de solo), diga claramente o que falta e oriente onde obter no app.
- Adubação e calagem seguem o Boletim 100 (IAC)/CFSEMG.
- Só cite defensivos que existam na base do app e sejam registrados para café; NUNCA invente produto, dose, carência ou registro — mande confirmar no AGROFIT.
- Toda recomendação é apoio à decisão; a aplicação exige validação e receituário do engenheiro agrônomo responsável (CREA/CFTA), com EPI e intervalo de segurança.
- Não dê conselho médico nem financeiro/investimento. Seja conciso (máx ~180 palavras); use listas curtas quando ajudar.`;
    const conversa = historico.map((m) => (m.role === "user" ? "Produtor" : "Café IA") + ": " + m.text).join("\n");
    const prompt = `${sistema}\n\n=== CONTEXTO DA PROPRIEDADE ===\n${buildFarmContext()}\n\n=== CONVERSA ===\n${conversa}\nCafé IA:`;

    } catch (err) {
      setChat((c) => [...c, { role: "assistant", text: "Não consegui responder agora: " + err.message }]);

  }

  async function buscarClima() {
    if (!cidade) return;
    setClimaLoading(true);
    setClimaError(null);
    setClimaData(null);
    try {
      const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cidade)}&count=1&language=pt&format=json`);
      const geo = await geoRes.json();
      if (!geo.results || geo.results.length === 0) {
        setClimaError("Cidade não encontrada. Tente incluir o estado, ex: 'Ouro Fino, MG'.");
        setClimaLoading(false);
        return;
      }
      const { latitude, longitude, name, admin1 } = geo.results[0];
      const fRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,relative_humidity_2m_mean,wind_speed_10m_max&timezone=auto&forecast_days=10`);
      const f = await fRes.json();
      if (!f.daily) {
        setClimaError("Não foi possível obter a previsão para esta localização.");
        setClimaLoading(false);
        return;
      }
      const days = f.daily.time.map((t, i) => ({
        data: t,
        tmax: f.daily.temperature_2m_max[i],
        tmin: f.daily.temperature_2m_min[i],
        chuva: f.daily.precipitation_sum[i],
        probChuva: f.daily.precipitation_probability_max[i],
        umidade: f.daily.relative_humidity_2m_mean ? f.daily.relative_humidity_2m_mean[i] : null,
        vento: f.daily.wind_speed_10m_max[i],
      }));
      const riscoFerrugem = days.filter((d) => d.tmax >= 21 && d.tmax <= 26 && (d.umidade == null || d.umidade > 75)).length;
      setClimaData({ local: `${name}${admin1 ? ", " + admin1 : ""}`, days, riscoFerrugem });
      addToHistory("Consulta de clima", `${name} — risco ferrugem ${riscoFerrugem}/10 dias`);
    } catch (err) {
      setClimaError("Erro ao buscar clima: " + err.message);
    }
    setClimaLoading(false);
  }

  const plantasPorHa = espac.entreLinhas > 0 && espac.entrePlantas > 0 ? Math.round(10000 / (espac.entreLinhas * espac.entrePlantas)) : 0;

                  <p className="text-xs">Janela de 10 dias analisada. Dias com risco elevado de ferrugem: ${climaData.riscoFerrugem}.</p>
                </section>
              `}

              <section className="mt-6 pt-3 border-t border-stone-300 text-xs text-stone-400">
                Relatório gerado com apoio de inteligência artificial e regras agronômicas simplificadas (Boletim 100 / CFSEMG). Validação técnica e assinatura de agrônomo responsável (CREA/CFTA) são obrigatórias antes de qualquer aplicação ou recomendação a campo.
              </section>
            </div>
          </div>
        `}
      </main>

      ${showAuth && html`<${AuthModal} sbUrl=${sbUrl} setSbUrl=${setSbUrl} sbKey=${sbKey} setSbKey=${setSbKey} client=${sbRef.current} session=${session} profile=${profile} onClose=${() => setShowAuth(false)} />`}
      ${showConsulta && html`<${ConsultaModal} onClose=${() => setShowConsulta(false)} propriedade=${propriedade} />`}
      ${showConfig && html`<${ConfigModal}
        apiKey=${apiKey}
        setApiKey=${setApiKey}
        googleVisionKey=${googleVisionKey}
        setGoogleVisionKey=${setGoogleVisionKey}
        azureOcrKey=${azureOcrKey}
        setAzureOcrKey=${setAzureOcrKey}
        azureOcrEndpoint=${azureOcrEndpoint}
        setAzureOcrEndpoint=${setAzureOcrEndpoint}
        rememberKey=${rememberKey}
        setRememberKey=${setRememberKey}
        onClose=${() => setShowConfig(false)}
        onExport=${exportarDados}
        onImport=${importarDados}
      />`}
    </div>
  `;
}

const root = createRoot(document.getElementById("root"));
root.render(html`<${ErrorBoundary}><${CafeRealIA} /></${ErrorBoundary}>`);
</script>
</body>
</html>
