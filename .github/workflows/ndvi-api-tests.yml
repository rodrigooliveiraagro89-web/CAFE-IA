name: Test NDVI API

on:
  push:
    branches: [main]
    paths:
      - "services/ndvi-api/**"
  pull_request:
    paths:
      - "services/ndvi-api/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ndvi-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
